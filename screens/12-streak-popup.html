<!-- ═══ Streak Fire Popup + Freeze Toast ═══ -->
<div id="streakFirePopup">
  <div class="sfp-card" id="sfpCard">
    <div class="sfp-fire-wrap" id="sfpFireEmoji">🔥</div>
    <div class="sfp-num" id="sfpNum">5</div>
    <div class="sfp-label" id="sfpLabel">Streak Barakar!</div>
    <div class="sfp-sub" id="sfpSub">Wah! Aaj bhi seekha! 💪</div>
    <div class="sfp-milestone" id="sfpMilestone">🎉 7 Din Ka Milestone!</div>
    <div class="sfp-freeze-box" id="sfpFreezeBox">
      <div style="font-size:28px">🧊</div>
      <div class="sfp-freeze-inner">
        <div class="sfp-freeze-title">👑 Streak Freeze Available!</div>
        <div class="sfp-freeze-sub" id="sfpFreezeCount">2 freezes baaki hain</div>
      </div>
    </div>
    <button class="sfp-close-btn" onclick="closeStreakPopup()">🔥 Aage Baro!</button>
  </div>
</div>

<!-- STREAK FREEZE TOAST -->
<div id="streakFreezeToast">🧊 Streak Freeze Laga Diya! Kal bhi safe hai!</div>
