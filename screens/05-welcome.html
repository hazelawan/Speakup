<!-- ═══ Welcome Screen ═══ -->
<div class="screen" id="welcome" style="background:#fff;overflow:hidden;">

  <!-- Animated background blobs -->
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;">
    <div style="position:absolute;top:-80px;left:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(88,204,2,.18),transparent 70%);animation:floatUp 4s ease infinite;"></div>
    <div style="position:absolute;top:120px;right:-80px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(28,176,246,.13),transparent 70%);animation:floatUp 5s ease infinite .8s;"></div>
    <div style="position:absolute;bottom:200px;left:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(206,130,255,.12),transparent 70%);animation:floatUp 3.5s ease infinite .4s;"></div>
    <!-- Floating stars -->
    <div style="position:absolute;top:18%;left:12%;font-size:18px;animation:floatUp 3s ease infinite .2s;opacity:.6;">⭐</div>
    <div style="position:absolute;top:28%;right:14%;font-size:14px;animation:floatUp 4s ease infinite .9s;opacity:.5;">✨</div>
    <div style="position:absolute;top:45%;left:8%;font-size:12px;animation:floatUp 3.5s ease infinite 1.2s;opacity:.4;">🌟</div>
    <div style="position:absolute;top:15%;right:20%;font-size:10px;animation:floatUp 2.8s ease infinite .5s;opacity:.5;">💫</div>
  </div>

  <!-- Main content -->
  <div style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:space-between;min-height:100vh;padding:0 24px;">

    <!-- Top section: App name -->
    <div style="width:100%;text-align:center;padding-top:56px;animation:slideInLeft .6s ease;">
      <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(88,204,2,.1);border:1.5px solid rgba(88,204,2,.3);border-radius:40px;padding:6px 18px;margin-bottom:0;">
        <span style="font-size:14px;">🇵🇰</span>
        <span style="font-family:'Fredoka One',sans-serif;font-size:14px;color:#3a8f00;letter-spacing:.5px;">SpeakUp — Zubaan Seekho</span>
      </div>
    </div>

    <!-- Owl + Speech bubble -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:0;margin-top:-20px;">

      <!-- Speech bubble -->
      <div id="wlBubble" style="background:#fff;border:2.5px solid #e5e5e5;border-radius:20px;padding:14px 22px;max-width:260px;text-align:center;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.08);animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .3s both;">
        <div id="wlBubbleText" style="font-family:'Fredoka One',sans-serif;font-size:18px;color:#333;line-height:1.4;">Hi! Main hoon <span style="color:#58CC02;">Ollie</span> 👋</div>
        <!-- Triangle -->
        <div style="position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:13px solid #e5e5e5;"></div>
        <div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:11px solid #fff;"></div>
      </div>

      <!-- CSS Animated Owl -->
      <div style="margin-top:14px;animation:owlBounce 2.4s ease infinite;filter:drop-shadow(0 12px 24px rgba(88,204,2,.25));">
        <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <!-- Body -->
          <ellipse cx="80" cy="100" rx="52" ry="46" fill="#58CC02"></ellipse>
          <ellipse cx="80" cy="108" rx="36" ry="30" fill="#7CDB3C"></ellipse>
          <!-- Wings -->
          <ellipse cx="30" cy="98" rx="22" ry="14" fill="#46A800" transform="rotate(-20 30 98)"></ellipse>
          <ellipse cx="130" cy="98" rx="22" ry="14" fill="#46A800" transform="rotate(20 130 98)"></ellipse>
          <!-- Head -->
          <ellipse cx="80" cy="62" rx="42" ry="38" fill="#58CC02"></ellipse>
          <!-- Ear tufts -->
          <ellipse cx="54" cy="30" rx="10" ry="16" fill="#46A800" transform="rotate(-15 54 30)"></ellipse>
          <ellipse cx="106" cy="30" rx="10" ry="16" fill="#46A800" transform="rotate(15 106 30)"></ellipse>
          <!-- Face white patch -->
          <ellipse cx="80" cy="68" rx="28" ry="24" fill="#D7F9A0"></ellipse>
          <!-- Eyes -->
          <circle cx="67" cy="60" r="13" fill="#fff" stroke="#ddd" stroke-width="1.5"></circle>
          <circle cx="93" cy="60" r="13" fill="#fff" stroke="#ddd" stroke-width="1.5"></circle>
          <circle cx="67" cy="62" r="7" fill="#1a1a1a"></circle>
          <circle cx="93" cy="62" r="7" fill="#1a1a1a"></circle>
          <!-- Eye shine -->
          <circle cx="71" cy="58" r="2.5" fill="#fff"></circle>
          <circle cx="97" cy="58" r="2.5" fill="#fff"></circle>
          <!-- Beak -->
          <ellipse cx="80" cy="76" rx="9" ry="7" fill="#FFAA00"></ellipse>
          <path d="M71 76 Q80 83 89 76" stroke="#e08800" stroke-width="1.5" fill="none"></path>
          <!-- Belly dots -->
          <circle cx="72" cy="105" r="4" fill="#46A800" opacity=".6"></circle>
          <circle cx="80" cy="110" r="4" fill="#46A800" opacity=".6"></circle>
          <circle cx="88" cy="105" r="4" fill="#46A800" opacity=".6"></circle>
          <!-- Feet -->
          <ellipse cx="66" cy="144" rx="14" ry="7" fill="#FFAA00"></ellipse>
          <ellipse cx="94" cy="144" rx="14" ry="7" fill="#FFAA00"></ellipse>
          <line x1="58" y1="144" x2="54" y2="152" stroke="#e08800" stroke-width="3" stroke-linecap="round"></line>
          <line x1="66" y1="146" x2="66" y2="154" stroke="#e08800" stroke-width="3" stroke-linecap="round"></line>
          <line x1="74" y1="144" x2="78" y2="152" stroke="#e08800" stroke-width="3" stroke-linecap="round"></line>
          <line x1="86" y1="144" x2="82" y2="152" stroke="#e08800" stroke-width="3" stroke-linecap="round"></line>
          <line x1="94" y1="146" x2="94" y2="154" stroke="#e08800" stroke-width="3" stroke-linecap="round"></line>
          <line x1="102" y1="144" x2="106" y2="152" stroke="#e08800" stroke-width="3" stroke-linecap="round"></line>
        </svg>
      </div>
    </div>

    <!-- Bottom card: input + button -->
    <div style="width:100%;padding-bottom:40px;animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) .5s both;">
      <div style="background:#fff;border-radius:28px 28px 0 0;padding:28px 20px 0;box-shadow:0 -4px 32px rgba(0,0,0,.08);">
        <div style="font-family:'Fredoka One',sans-serif;font-size:22px;color:#222;text-align:center;margin-bottom:6px;">Apna naam batao! 😊</div>
        <div style="font-size:13px;color:#999;text-align:center;margin-bottom:20px;">Koi bhi zubaan seekho — tumhara safar shuru hoga</div>
        <input id="nameIn" type="text" placeholder="Naam likho... (e.g. Ahmed)" maxlength="28" style="width:100%;padding:16px 18px;border-radius:16px;border:2.5px solid #e5e5e5;font-size:17px;font-family:Nunito,sans-serif;color:#222;background:#f9f9f9;outline:none;box-sizing:border-box;transition:border-color .2s;margin-bottom:14px;" onfocus="this.style.borderColor='#58CC02';this.style.background='#fff'" onblur="this.style.borderColor='#e5e5e5';this.style.background='#f9f9f9'" onkeydown="if(event.key==='Enter')goName()">
        <button onclick="goName()" style="width:100%;padding:18px;border-radius:16px;border:none;background:#58CC02;color:#fff;font-family:'Fredoka One',sans-serif;font-size:20px;cursor:pointer;box-shadow:0 6px 0 #46A800;letter-spacing:.5px;transition:transform .1s,box-shadow .1s;active:transform:translateY(3px);" onmousedown="this.style.transform='translateY(3px)';this.style.boxShadow='0 3px 0 #46A800'" onmouseup="this.style.transform='';this.style.boxShadow='0 6px 0 #46A800'" ontouchstart="this.style.transform='translateY(3px)';this.style.boxShadow='0 3px 0 #46A800'" ontouchend="this.style.transform='';this.style.boxShadow='0 6px 0 #46A800'">
          SHURU KARO →
        </button>
        <!-- Features row -->
        <div style="display:flex;justify-content:center;gap:20px;margin-top:20px;padding-bottom:8px;">
          <div style="text-align:center;">
            <div style="font-size:20px">🎮</div>
            <div style="font-size:10px;color:#aaa;font-weight:700;margin-top:3px;">Fun</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:20px">🔥</div>
            <div style="font-size:10px;color:#aaa;font-weight:700;margin-top:3px;">Streaks</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:20px">🏆</div>
            <div style="font-size:10px;color:#aaa;font-weight:700;margin-top:3px;">Certificates</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:20px">🌍</div>
            <div style="font-size:10px;color:#aaa;font-weight:700;margin-top:3px;">4 Zubaanein</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
